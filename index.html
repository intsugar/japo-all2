<style>
  :root{
    --bg:#F6F3F3;
    --ink:#161414;
    --red:#C8102E;
    --red-dark:#9E0B23;
    --card:#FFFFFF;
    --line:#E4DEDE;
    --muted:#6E6666;
    --amber-bg:#FFF4E0;
    --amber-ink:#8A5A00;
    --green-bg:#E8F5E9;
    --green-ink:#1B5E20;
    --green:#2E7D32;
    --radius:14px;
  }
  body.dark{
    --bg:#131010;
    --ink:#F1EDED;
    --card:#1C1919;
    --line:#342E2E;
    --muted:#A39A9A;
    --amber-bg:#38290D;
    --amber-ink:#F2C879;
    --green-bg:#132B18;
    --green-ink:#86DB92;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;transition:background .2s,color .2s}
  
  body.dark .mode button.active{color:#131010}
  body.dark .mode button.active.avoid{color:#fff}
  body.dark .mode button.active.safe{color:#fff}
  body.dark .card-head:active{background:#242020}
  body.dark table.alg td{border-bottom-color:#2C2727}
  body.dark table.alg tr.match td{background:#331119}

  header{background:#000;color:#fff;padding:18px 16px 16px;text-align:center;position:relative}
  .themeBtn{background:transparent;border:1.5px solid #4A4444;color:#fff;border-radius:999px;width:46px;height:30px;font-size:14px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;flex:none}
  .themeBtn:active{background:#221E1E}
  .langBtn{background:transparent;border:1.5px solid #4A4444;color:#fff;border-radius:999px;width:46px;height:30px;padding:0;font-family:"Inter",sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer;flex:none}
  .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:880px;margin:0 auto}
  .topRow .logo{flex:1}
  .langBtn:active{background:#221E1E}
  @media(max-width:600px){.logo{font-size:clamp(17px,5.4vw,24px)}}
  .logo{display:flex;align-items:center;justify-content:center;font-family:'Audiowide',sans-serif;font-size:clamp(22px,6.5vw,36px);letter-spacing:.14em;color:#fff;line-height:1;font-weight:400}
  .logo .o{width:.94em;height:.82em;border:.088em solid #fff;border-radius:.27em;display:inline-flex;align-items:center;justify-content:center;margin:0 .17em;box-sizing:border-box;flex:none}
  .logo .o i{display:block;width:.17em;height:.17em;background:#fff;border-radius:.045em}
  header .rule{width:min(300px,70%);height:1px;background:#3A3535;margin:12px auto 8px}
  header .cocina{font-family:'Audiowide',sans-serif;font-size:clamp(10px,2.6vw,13px);letter-spacing:.5em;text-indent:.5em;color:#fff}
  header .sub{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#847C7C;margin-top:10px}

  .wrap{max-width:880px;margin:0 auto;padding:16px 14px 60px}

  .controls{position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 0 8px;border-bottom:1px solid var(--line)}
  .searchbox{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--ink);border-radius:999px;padding:10px 16px;color:var(--ink)}
  .searchbox svg{flex:none}
  .searchbox input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:var(--ink);font-family:inherit}
  .searchbox button.clear{border:none;background:var(--line);color:var(--ink);border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center}

  .mode{display:flex;gap:6px;margin-top:10px}
  .mode button{flex:1;padding:9px 6px;border-radius:999px;border:1.5px solid var(--ink);background:transparent;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);transition:all .15s}
  .mode button.active{background:var(--ink);color:#fff}
  .mode button.active.avoid{background:var(--red);border-color:var(--red)}
  .mode button.active.safe{background:var(--green);border-color:var(--green)}

  .chips{display:flex;gap:6px;overflow-x:auto;padding:10px 2px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chips button{flex:none;padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--ink);white-space:nowrap}
  .chips button.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
  .chips.safeMode button.on{background:var(--green);border-color:var(--green)}

  .hint{font-size:12px;color:var(--muted);margin-top:6px;text-align:center}
  .count{font-size:13px;color:var(--muted);margin:14px 2px 8px}
  .count b{color:var(--ink)}

  .cat{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin:22px 2px 10px;display:flex;align-items:center;gap:10px; text-transform: uppercase;}
  .cat::after{content:"";flex:1;height:1px;background:var(--line)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
  .card-head:active{background:#FAF7F7}
  .card-title{flex:1}
  .card-title h3{font-family:'Playfair Display',serif;font-size:17.5px;font-weight:700}
  .card-title .cat-tag{display:none;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .card.open .card-title .cat-tag{display:block}
  .badge{flex:none;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .badge.hit{background:var(--red);color:#fff}
  .badge.safe{background:var(--green-bg);color:var(--green-ink)}
  .badge.caution{background:var(--amber-bg);color:var(--amber-ink)}
  .chev{flex:none;transition:transform .2s;color:var(--muted)}
  .card.open .chev{transform:rotate(180deg)}

  .card-body{display:none;padding:0 16px 16px;border-top:1px dashed var(--line)}
  .card.open .card-body{display:block}
  .sec{margin-top:14px}
  .sec h4{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:7px}
  .ing{display:flex;flex-wrap:wrap;gap:6px}
  .ing span{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12.5px}

  table.alg{width:100%;border-collapse:collapse;font-size:13px}
  table.alg td{padding:6px 8px;border-bottom:1px solid #F0EBEB;vertical-align:top}
  table.alg td.a{font-weight:600;white-space:nowrap;width:110px}
  table.alg tr.match td{background:#FDEEF1}
  table.alg tr.match td.a{color:var(--red)}
  .cc{display:inline-block;background:var(--amber-bg);color:var(--amber-ink);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:4px}

  .thumb{display:block;width:88px;height:88px;object-fit:cover;border-radius:10px;border:1px solid var(--line);margin:12px auto 0;cursor:zoom-in}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center;cursor:zoom-out;padding:18px}
  .lightbox.on{display:flex}
  .lightbox img{max-width:min(94vw,760px);max-height:86vh;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
  .pair{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:6px}
  .pair b{font-weight:600}
  .note{background:var(--amber-bg);color:var(--amber-ink);border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:10px}

  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .big{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px}

  footer{max-width:880px;margin:0 auto;padding:20px 16px 40px;font-size:11.5px;color:var(--muted);text-align:center;border-top:1px solid var(--line)}
  footer .warn{color:var(--red);font-weight:600}

  @media(min-width:700px){
    .cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{margin-bottom:0}
  }
</style>
</head>

"use strict";
let lang = "en";
try { lang = localStorage.getItem("japoAllLang") || (((navigator.language||"").toLowerCase().indexOf("es")===0) ? "es" : "en"); } catch(e){}
let mode = "contains", query = "", activeChip = null;
const openCards = new Set();
const $ = function(id){ return document.getElementById(id); };
const $q=$("q"), $clear=$("clearBtn"), $chips=$("chips"), $results=$("results"), $count=$("count"), $hint=$("hint"), $mC=$("mContains"), $mA=$("mAvoid"), $tb=$("themeBtn"), $lb=$("langBtn"), $sub=$("subT"), $ft1=$("ft1"), $ft2=$("ft2");
const L = function(){ return DATA[lang]; };
const T = function(k){ return DATA[lang].ui[k]; };
const norm = function(s){ return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,""); };

function textMatch(hay, t){
  const h = norm(hay);
  if (t.length >= 5) return h.includes(t);
  return h.split(/[^a-z0-9]+/).some(function(w){ return w === t; });
}

function dishAllergenMatches(d, term){
  const t = norm(term), hard = [], cross = [];
  d.alg.forEach(function(r){
    if (textMatch(r.a, t) || textMatch(r.s, t)) { (r.cc ? cross : hard).push(r); }
  });
  return { hard: hard, cross: cross };
}

function dishTextMatch(d, term){
  const t = norm(term);
  return textMatch(d.name, t) || d.ings.some(function(i){ return textMatch(i, t); });
}

function allergenList(){
  const s = new Set();
  L().dishes.forEach(function(d){ d.alg.forEach(function(x){ s.add(x.a); }); });
  return Array.from(s).sort(function(a,b){ return a.localeCompare(b, lang); });
}

function getFiltered(){
  const term = (activeChip || query).trim();
  if (!term) return { list: L().dishes.map(function(d){ return { d: d, badge: null, rows: [] }; }), term: "" };
  const out = [];
  L().dishes.forEach(function(d){
    const m = dishAllergenMatches(d, term);
    const has = m.hard.length > 0, cc = m.cross.length > 0;
    if (mode === "contains") {
      if (has || cc || dishTextMatch(d, term)) {
        out.push({ d: d, badge: has ? "hit" : (cc ? "caution" : "name"), rows: m.hard.concat(m.cross) });
      }
    } else {
      if (!has && !cc) { out.push({ d: d, badge: "safe", rows: [] }); }
      else if (!has && cc) { out.push({ d: d, badge: "caution", rows: m.cross }); }
    }
  });
  if (mode === "avoid") out.sort(function(a,b){ return (a.badge==="caution") - (b.badge==="caution"); });
  return { list: out, term: term };
}

const esc = function(s){ return s.replace(/[&<>"]/g, function(c){ return { "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[c]; }); };

function renderChips(){
  $chips.classList.toggle("safeMode", mode === "avoid");
  $chips.innerHTML = "";
  allergenList().forEach(function(a){
    const b = document.createElement("button");
    b.textContent = a;
    if (activeChip === a) b.classList.add("on");
    b.onclick = function(){
      activeChip = (activeChip === a) ? null : a;
      if (activeChip) { query = ""; $q.value = ""; }
      render();
    };
    $chips.appendChild(b);
  });
}

function badgeHtml(badge, term){
  if (!badge || badge === "name") return "";
  if (badge === "hit") return '<span class="badge hit">' + T("badgeC") + ' ' + esc(term) + '</span>';
  if (badge === "safe") return '<span class="badge safe">' + T("badgeS") + '</span>';
  if (badge === "caution") return '<span class="badge caution">' + T("badgeW") + '</span>';
  return "";
}

function cardHtml(item, term){
  const d = item.d;
  const matched = new Set(item.rows.map(function(r){ return r.a; }));
  let rows = "";
  d.alg.forEach(function(r){
    const hit = term && matched.has(r.a);
    rows += '<tr class="' + (hit ? "match" : "") + '"><td class="a">' + esc(r.a) + (r.cc ? '<span class="cc">' + T("cc") + '</span>' : '') + '</td><td>' + esc(r.s) + '</td></tr>';
  });
  let ings = "";
  d.ings.forEach(function(i){ ings += '<span>' + esc(i) + '</span>'; });
  const thumb = d.img ? '<img class="thumb" src="' + (d.thumb || d.img) + '" data-full="' + d.img + '" alt="' + esc(d.name) + '" loading="lazy">' : '';
  let note = "";
  if (item.badge === "caution" && mode === "avoid") {
    note = '<div class="note">' + T("noteA1") + '<b>' + T("noteA2") + '</b>: ' + item.rows.map(function(r){ return esc(r.a); }).join(", ") + T("noteA3") + '</div>';
  }
  return '<div class="card ' + (openCards.has(d.name) ? "open" : "") + '" data-id="' + esc(d.name) + '">'
    + '<div class="card-head">'
    + '<div class="card-title"><h3>' + esc(d.name) + '</h3><div class="cat-tag">' + esc(d.cat) + '</div></div>'
    + badgeHtml(item.badge, term)
    + '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
    + '</div><div class="card-body">' + thumb + note
    + '<div class="sec"><h4>' + T("ing") + '</h4><div class="ing">' + ings + '</div></div>'
    + '<div class="sec"><h4>' + T("alg") + '</h4><table class="alg">' + rows + '</table></div>'
    + '<div class="sec"><h4>' + T("pairT") + '</h4>'
    + '<div class="pair">🥂 <b>' + T("w") + ':</b> ' + esc(d.pair.w) + '</div>'
    + '<div class="pair">🍷 <b>' + T("r") + ':</b> ' + esc(d.pair.r) + '</div>'
    + '<div class="pair">🍶 <b>' + T("sk") + ':</b> ' + esc(d.pair.s) + '</div>'
    + '</div></div></div>';
}

function render(){
  renderChips();
  const f = getFiltered(), list = f.list, term = f.term;
  $clear.style.display = ($q.value || activeChip) ? "flex" : "none";
  if (term) {
    $count.innerHTML = '<b>' + list.length + '</b> ' + T("of") + ' ' + L().dishes.length + ' ' + T("dishesW") + ' ' + (mode === "contains" ? T("contain") : T("freeOf")) + ' <b>«' + esc(term) + '»</b>' + (mode === "avoid" ? T("avoidNote") : "");
  } else {
    $count.innerHTML = '<b>' + L().dishes.length + '</b> ' + T("count0");
  }
  if (list.length === 0) {
    const t1 = mode === "avoid" ? T("e1") : T("e2");
    const t2 = mode === "avoid" ? T("e1b") : T("e2b");
    $results.innerHTML = '<div class="empty"><div class="big">' + t1 + '</div><p>' + t2 + '</p></div>';
    return;
  }
  let html = "";
  L().cats.forEach(function(cat){
    const items = list.filter(function(x){ return x.d.cat === cat; });
    if (!items.length) return;
    let cards = "";
    items.forEach(function(x){ cards += cardHtml(x, term); });
    html += '<div class="cat">' + esc(cat) + '</div><div class="cards-grid">' + cards + '</div>';
  });
  $results.innerHTML = html;
}

$results.addEventListener("click", function(e){
  const h = e.target.closest(".card-head");
  if (!h) return;
  const c = h.parentElement, id = c.dataset.id;
  if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
  c.classList.toggle("open");
});

const $lbx = document.getElementById("lightbox");
$results.addEventListener("click", function(e){
  if (e.target && e.target.classList && e.target.classList.contains("thumb")) {
    document.getElementById("lightboxImg").src = e.target.dataset.full || e.target.src;
    document.getElementById("lightboxImg").alt = e.target.alt;
    $lbx.classList.add("on");
  }
});

$lbx.addEventListener("click", function(){ $lbx.classList.remove("on"); });

function applyLang(l, keepFilters){
  lang = l;
  try { localStorage.setItem("japoAllLang", l); } catch(e){}
  $lb.textContent = (l === "en") ? "ESP" : "ENG";
  $q.placeholder = T("placeholder");
  $mC.textContent = T("modeC");
  $mA.textContent = T("modeA");
  $sub.textContent = T("sub");
  $ft1.textContent = T("ft1");
  $ft2.textContent = T("ft2");
  document.title = T("title");
  document.documentElement.lang = l;
  $hint.textContent = (mode === "contains") ? (query || activeChip ? T("hintC") : T("hint0")) : T("hintA");
  if (!keepFilters) { activeChip = null; query = ""; $q.value = ""; }
  render();
}

$lb.onclick = function(){ applyLang(lang === "en" ? "es" : "en", false); };
$q.addEventListener("input", function(){ query = $q.value; activeChip = null; render(); });
$clear.onclick = function(){ query = ""; $q.value = ""; activeChip = null; render(); $q.focus(); };
$mC.onclick = function(){ mode = "contains"; $mC.className = "active avoid"; $mA.className = ""; $hint.textContent = T("hintC"); render(); };
$mA.onclick = function(){ mode = "avoid"; $mA.className = "active safe"; $mC.className = ""; $hint.textContent = T("hintA"); render(); };

function applyTheme(t){
  document.body.classList.toggle("dark", t === "dark");
  $tb.textContent = t === "dark" ? "☀️" : "🌙";
  try { localStorage.setItem("japoAllTheme", t); } catch(e){}
}

let savedTheme = "dark";
try { savedTheme = localStorage.getItem("japoAllTheme") || "dark"; } catch(e){}
applyTheme(savedTheme);
$tb.onclick = function(){ applyTheme(document.body.classList.contains("dark") ? "light" : "dark"); };
applyLang(lang, false);

</script>
